name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven
        run: mvn -B clean package

      - name: Subir el .jar generado como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SnakePlugin
          path: target/*.jar
